<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LuxVibe Travels | Destinations</title>

<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- FontAwesome Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<!-- Google Fonts (Poppins) -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- style css -->
<link href="assets/css/style.css" rel="stylesheet">

</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg fixed-top">
<div class="container">
<a class="navbar-brand">LuxVibe Travels</a>
</div>
</nav>

<!-- ================= HERO ================= -->
<section class="hero">
<div class="hero-content">
<h1>Explore Elite Destinations</h1>
<p>Goa • Dubai • Rajasthan • Dwarka • Manali</p>
</div>
</section>

<!-- ================= MAIN ================= -->
<section class="py-5">
<div class="container">
<div class="row g-4">

<!-- FILTER -->
<div class="col-lg-3">
<div class="filter-box">

<h5 class="filter-title">Filters</h5>

<button class="btn btn-sm btn-outline-light w-100 mb-3" id="reset">Reset</button>

<h6>Destination</h6>
<div>
<label><input type="checkbox" class="filter-destination" value="Goa"> Goa</label><br>
<label><input type="checkbox" class="filter-destination" value="Dubai"> Dubai</label><br>
<label><input type="checkbox" class="filter-destination" value="Rajasthan"> Rajasthan</label><br>
<label><input type="checkbox" class="filter-destination" value="Dwarka"> Dwarka</label><br>
<label><input type="checkbox" class="filter-destination" value="Manali"> Manali</label>
</div>

<hr>

<h6>Budget</h6>
<label><input type="radio" name="budget" value="low"> < ₹50K</label><br>
<label><input type="radio" name="budget" value="mid"> ₹50K-1L</label><br>
<label><input type="radio" name="budget" value="high"> 1L+</label>

</div>
</div>

<!-- PACKAGES -->
<div class="col-lg-9">
<div class="row g-4" id="packageList">

<!-- CARD 1 -->
<div class="col-md-4 package-item" data-destination="Goa" data-budget="mid">
<div class="package-card">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
<div class="p-3">
<span class="badge badge-gold mb-2">4N/5D</span>
<h5>Goa Luxury Escape</h5>
<p class="text-muted small">Beach villas & yacht party</p>
<button class="btn btn-gold w-100">Book on WhatsApp</button>
</div>
</div>
</div>

<!-- CARD 2 -->
<div class="col-md-4 package-item" data-destination="Dubai" data-budget="high">
<div class="package-card">
<img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c">
<div class="p-3">
<span class="badge badge-gold mb-2">5N/6D</span>
<h5>Dubai Ultra Luxury</h5>
<p class="text-muted small">Burj Khalifa VIP stay</p>
<button class="btn btn-gold w-100">Book on WhatsApp</button>
</div>
</div>
</div>

<!-- CARD 3 -->
<div class="col-md-4 package-item" data-destination="Manali" data-budget="mid">
<div class="package-card">
<img src="https://images.unsplash.com/photo-1605649487212-47bdab064df7">
<div class="p-3">
<span class="badge badge-gold mb-2">5N/6D</span>
<h5>Manali Snow Escape</h5>
<p class="text-muted small">Luxury mountain stay</p>
<button class="btn btn-gold w-100">Book on WhatsApp</button>
</div>
</div>
</div>

</div>

<!-- NO RESULT -->
<div id="noResult" class="text-center mt-4 d-none">
<h4>No Packages Found</h4>
</div>

</div>
</div>
</div>
</section>

<!-- WHATSAPP -->
<a href="https://wa.me/919876543210" class="whatsapp">
<i class="fab fa-whatsapp"></i>
</a>

<!-- ================= SCRIPTS ================= -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
 <script src="assets/js/main.js"></script>
</body>
</html>
